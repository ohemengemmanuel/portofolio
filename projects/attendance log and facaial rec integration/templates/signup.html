<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AttendLog — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&family=Roboto:wght@500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="../static/css/style.css" />
</head>
<body class="auth-body">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark"><span class="material-icons">assignment</span></div>
      <div class="auth-logo-text">
        <div class="auth-logo-name">Attend<span class="auth-logo-accent">Log</span></div>
        <div class="auth-logo-sub">Educator Dashboard</div>
      </div>
    </div>
    <h2 class="auth-heading">Create Account</h2>
    <div id="auth-error" class="auth-error" style="display:none"></div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Choose a username" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password <span class="field-note">(min. 6 characters)</span></label>
      <input type="password" id="password" placeholder="Choose a password" autocomplete="new-password" />
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" />
    </div>
    <button class="btn btn-primary auth-submit-btn" onclick="doSignup()" id="signup-btn">Create Account</button>
    <div class="auth-link">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</div>
<script>
async function doSignup() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const btn      = document.getElementById('signup-btn');
  if (!username || !password || !confirm) { showErr('Please fill in all fields'); return; }
  if (password !== confirm) { showErr('Passwords do not match'); return; }
  if (password.length < 6)  { showErr('Password must be at least 6 characters'); return; }
  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const res  = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      showErr(data.error || 'Signup failed');
      btn.disabled = false; btn.textContent = 'Create Account';
      return;
    }
    window.location.href = '/';
  } catch {
    showErr('Network error — is the server running?');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}
function showErr(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
document.getElementById('username').focus();
</script>
</body>
</html>
